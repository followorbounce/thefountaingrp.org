practice:
  name: "The Fountain Group"
  founded: "Est. 2018"
  tagline: "Compassionate psychiatric care for every stage of life."
  description: >
    The Fountain Group provides expert psychiatric care for children, adolescents,
    and adults. Led by board-certified psychiatrists Dr. Prashanth Pillai and
    Dr. Ksenia Pillai, the practice offers comprehensive mental health diagnosis
    and treatment in a secure and convenient setting — both in-person and via telehealth.
  philosophy: >
    We integrate lifestyle medicine into our practice, focusing on a holistic
    and biological approach to mental well-being. We prioritize accuracy,
    utilizing evidence-based methods to ensure precise diagnoses without rushing
    the process. While many discuss mental health, The Fountain Group is committed
    to fostering mental wealth.
  accepts_insurance: true
  insurance_note: >
    We accept major insurance providers and can assist with your out-of-network
    reimbursements.

