- question: "How do I know which doctor to book with?"
  answer: >
    In general: if you're seeking support for mood, anxiety, reproductive health, or
    perinatal concerns, Dr. Ksenia Pillai is likely the better fit. If you're looking
    for child, adolescent, or family-focused care, or need comprehensive adult
    psychiatry with a behavioral lens, Dr. Prashanth Pillai specializes in exactly that.
    If you're unsure, just tell us — we'll suggest the right fit, or select
    "No preference" when booking.

- question: "Do you see children and adolescents?"
  answer: >
    Yes. Dr. Prashanth Pillai specializes in child and adolescent psychiatry and sees
    patients at all stages of development. Dr. Ksenia Pillai also sees children.
    Both doctors are experienced in working with families alongside their young patients.

- question: "What does a first appointment cost?"
  answer: >
    Initial consultations are $399 (40 minutes) for both adult and child patients.
    Follow-up / medication management appointments are $199 (20 minutes).
    Initial consultations may extend to 1–2 sessions depending on history, collateral
    records, additional testing, and your preference.

- question: "Do you accept insurance?"
  answer: >
    Yes — we accept major insurance providers. We can also assist with your
    out-of-network reimbursements if your plan is not directly billed.
    Please contact us before booking if you have questions about your specific coverage.

- question: "Is telehealth available?"
  answer: >
    Yes. All appointment types are available via HIPAA-compliant telehealth for
    complete privacy and security. The same quality of care, wherever you are.

- question: "What if I need to cancel?"
  answer: >
    We ask for advance notice to cancel or reschedule. If something unexpected
    happens, please contact us as soon as possible — we understand that life is
    unpredictable and will always try to accommodate you.

- question: "Are after-hours crisis appointments available?"
  answer: >
    Yes. We provide after-hours crisis appointments at 1.5× the standard fee.
    If you are in immediate danger, please call 911 or go to your nearest
    emergency room. You can also call or text 988 (Suicide & Crisis Lifeline).

- question: "Is everything I share confidential?"
  answer: >
    Absolutely. Everything discussed in sessions is protected by patient confidentiality
    and HIPAA law. Information is only disclosed without consent in the rare circumstances
    where the law requires it. We will discuss this openly at the start of your care.
