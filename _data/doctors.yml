  bio_full: >
    Dr. Ksenia Pillai is a distinguished psychiatrist specializing in child,
    adult, and reproductive psychiatry. With extensive experience in mental health
    care across different life stages, she is dedicated to providing personalized
    and functional treatment tailored to each patient's unique needs.

    She earned her medical degree and completed her general psychiatry residency
    at Jamaica Hospital Medical Center, where she developed a deep understanding
    of the complexities of the human mind. Driven by a passion for expanding her
    expertise, she pursued specialized training in child psychiatry at SUNY
    Downstate.

    In addition, Dr. Pillai has extensive experience in reproductive psychiatry,
    helping individuals navigate the psychological challenges associated with
    pregnancy, postpartum mental health, and hormonal transitions.
