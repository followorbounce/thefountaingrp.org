  philosophy: >
    Dr. Ksenia Pillai believes that every patient deserves care that honors
    their full story — not just their diagnosis. She takes a functional and
    personalized approach, working closely with patients to understand the
    biological, psychological, and life-stage factors shaping their mental health.
    Her work in reproductive psychiatry reflects a deep commitment to supporting
    patients through some of the most vulnerable transitions in life.
