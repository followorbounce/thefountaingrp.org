---
layout: default
---

<div class="page-hero">
  <div class="page-hero__inner">
    {% if page.hero_label %}<div class="page-hero__label">{{ page.hero_label }}</div>{% endif %}
    <h1 class="page-hero__title">{{ page.hero_title | default: page.title }}</h1>
    {% if page.hero_sub %}<p class="page-hero__sub">{{ page.hero_sub }}</p>{% endif %}
  </div>
</div>

<main>
  {{ content }}
</main>
